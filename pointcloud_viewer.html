<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Pont Felhő Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }

    #canvas-container { position: fixed; inset: 0; z-index: 0; }

    #ui-panel {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      background: rgba(20,20,25,0.93); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 20px; width: 300px;
      backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: #4ade80; background: rgba(74,222,128,0.12); padding: 3px 8px; border-radius: 20px; }
    .badge.b2 { color: #60a5fa; background: rgba(96,165,250,0.12); }
    h2 { font-size: 15px; font-weight: 600; color: #fff; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed rgba(255,255,255,0.15); border-radius: 10px;
      padding: 20px 12px; text-align: center; cursor: pointer;
      transition: all .2s; color: #888; font-size: 13px; margin-bottom: 12px;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.05); }
    #drop-zone .icon { font-size: 24px; margin-bottom: 6px; }
    #drop-zone strong { display: block; color: #ccc; font-size: 13px; }

    #file-input { display: none; }

    /* Sliders */
    .slider-row { margin-top: 12px; }
    .slider-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    label { font-size: 11px; letter-spacing: .06em; color: #888; text-transform: uppercase; }
    .val { font-size: 12px; color: #ccc; }
    input[type=range] { width: 100%; accent-color: #4ade80; cursor: pointer; }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { cursor: pointer; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; padding: 9px 14px; transition: all .15s; }
    #reset-btn { flex: 1; background: rgba(255,255,255,0.08); color: #ccc; }
    #reset-btn:hover { background: rgba(255,255,255,0.15); }
    #top-btn { flex: 1; background: rgba(96,165,250,0.15); color: #60a5fa; }
    #top-btn:hover { background: rgba(96,165,250,0.25); }

    /* Status */
    #status-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: none; align-items: center; gap: 10px;
      background: rgba(20,20,25,0.96); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px; padding: 10px 22px; font-size: 13px;
      backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    #status-bar.show { display: flex; }
    #status-bar.error { border-color: rgba(248,113,113,.4); color: #f87171; }
    #status-bar.success { border-color: rgba(74,222,128,.3); color: #4ade80; }

    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.15); border-top-color: #4ade80; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint-panel {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      background: rgba(20,20,25,.85); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #555;
      line-height: 1.9; backdrop-filter: blur(8px);
    }
    #hint-panel span { color: #888; }

    #info-box {
      display: none; margin-top: 12px; padding: 10px 12px;
      background: rgba(255,255,255,.05); border-radius: 8px;
      font-size: 11px; color: #888; line-height: 1.7;
    }
    #info-box.show { display: block; }
    #info-box strong { color: #ccc; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-panel">
  <div class="panel-header">
    <span class="badge">PLY</span>
    <span class="badge b2">POINT CLOUD</span>
    <h2>3D Pont Felhő</h2>
  </div>

  <!-- URL betöltés -->
  <label>.PLY FÁJL URL-JE (GitHub raw stb.)</label>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input type="text" id="url-input" placeholder="https://raw.githubusercontent.com/.../*.ply"
      value="./2026.%2005.%2027.ply"
      style="flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e0e0e0;font-size:12px;padding:8px 10px;outline:none"/>
    <button id="url-load-btn" style="background:#4ade80;color:#0d1a0d;border-radius:8px;font-size:12px;font-weight:700;padding:8px 12px;border:none;cursor:pointer">▶</button>
  </div>

  <!-- Elválasztó -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div>
    <span style="font-size:11px;color:#555">VAGY</span>
    <div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div>
  </div>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <strong>Kattints vagy húzd ide a .ply fájlt</strong>
    Helyi fájl (Polycam, RealityCapture, stb.)
  </div>
  <input type="file" id="file-input" accept=".ply"/>

  <div id="info-box"></div>

  <div class="slider-row">
    <div class="slider-label-row">
      <label>Pont méret</label><span class="val" id="size-val">2.0</span>
    </div>
    <input type="range" id="point-size" min="0.5" max="10" step="0.5" value="2"/>
  </div>

  <div class="btn-row">
    <button id="reset-btn">↺ Kamera reset</button>
    <button id="top-btn">⬆ Felülnézet</button>
  </div>
</div>

<div id="status-bar">
  <div class="spinner" id="spinner"></div>
  <span id="status-text">Betöltés...</span>
</div>

<div id="hint-panel">
  <span>Bal gomb</span> Forgatás &nbsp;|&nbsp;
  <span>Jobb gomb</span> Mozgatás &nbsp;|&nbsp;
  <span>Scroll</span> Zoom
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function () {
  // ── Three.js setup ──────────────────────────────────────────────
  const container = document.getElementById('canvas-container');

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0d0d0d);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.001, 10000);
  camera.position.set(0, 0, 5);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.rotateSpeed = 0.6;
  controls.zoomSpeed = 1.2;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let pointMesh = null;

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Status helpers ──────────────────────────────────────────────
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('status-text');
  const spn = document.getElementById('spinner');

  function showStatus(msg, type) {
    bar.className = 'show ' + (type || 'loading');
    txt.textContent = msg;
    spn.style.display = (type === 'error' || type === 'success') ? 'none' : 'block';
  }
  function hideStatus() { bar.className = ''; }

  // ── PLY Parser (binary little-endian + ascii) ───────────────────
  function parsePLY(buffer) {
    const dec = new TextDecoder();
    const bytes = new Uint8Array(buffer);

    // Read header as text
    let headerEnd = 0;
    for (let i = 0; i < bytes.length - 9; i++) {
      if (dec.decode(bytes.slice(i, i + 10)) === 'end_header') {
        headerEnd = i + 10;
        // skip \r\n or \n
        if (bytes[headerEnd] === 13) headerEnd++;
        if (bytes[headerEnd] === 10) headerEnd++;
        break;
      }
    }

    const header = dec.decode(bytes.slice(0, headerEnd));

    // Parse vertex count
    const vcMatch = header.match(/element vertex (\d+)/);
    if (!vcMatch) throw new Error('Nem találom a vertex számot a fejlécben.');
    const vertexCount = parseInt(vcMatch[1]);

    // Parse properties
    const propLines = [...header.matchAll(/property (\S+) (\S+)/g)];
    const props = propLines.map(m => ({ type: m[1], name: m[2] }));

    const isBinary = header.includes('binary_little_endian');
    const isAscii = header.includes('ascii');

    // Calculate stride
    const typeSize = { char:1, uchar:1, short:2, ushort:2, int:4, uint:4, float:4, double:8, int8:1, uint8:1, int16:2, uint16:2, int32:4, uint32:4, float32:4, float64:8 };
    let stride = 0;
    for (const p of props) stride += (typeSize[p.type] || 4);

    // Find indices of x, y, z, red, green, blue
    function findProp(names) {
      for (const n of names) {
        const idx = props.findIndex(p => p.name === n);
        if (idx !== -1) return idx;
      }
      return -1;
    }

    const xi = findProp(['x']); const yi = findProp(['y']); const zi = findProp(['z']);
    const ri = findProp(['red','r']); const gi = findProp(['green','g']); const bi = findProp(['blue','b']);

    if (xi < 0 || yi < 0 || zi < 0) throw new Error('Nem találom az x/y/z tulajdonságokat.');

    const positions = new Float32Array(vertexCount * 3);
    const colors = new Float32Array(vertexCount * 3);
    const hasColor = ri >= 0 && gi >= 0 && bi >= 0;

    if (isBinary) {
      const view = new DataView(buffer, headerEnd);
      // Build offset map
      const offsets = [];
      let off = 0;
      for (const p of props) {
        offsets.push(off);
        off += (typeSize[p.type] || 4);
      }

      function readVal(view, byteOff, type) {
        switch(type) {
          case 'double': case 'float64': return view.getFloat64(byteOff, true);
          case 'float': case 'float32': return view.getFloat32(byteOff, true);
          case 'int': case 'int32': return view.getInt32(byteOff, true);
          case 'uint': case 'uint32': return view.getUint32(byteOff, true);
          case 'short': case 'int16': return view.getInt16(byteOff, true);
          case 'ushort': case 'uint16': return view.getUint16(byteOff, true);
          case 'char': case 'int8': return view.getInt8(byteOff);
          case 'uchar': case 'uint8': default: return view.getUint8(byteOff);
        }
      }

      for (let i = 0; i < vertexCount; i++) {
        const base = i * stride;
        positions[i*3]   = readVal(view, base + offsets[xi], props[xi].type);
        positions[i*3+1] = readVal(view, base + offsets[yi], props[yi].type);
        positions[i*3+2] = readVal(view, base + offsets[zi], props[zi].type);
        if (hasColor) {
          colors[i*3]   = readVal(view, base + offsets[ri], props[ri].type) / 255;
          colors[i*3+1] = readVal(view, base + offsets[gi], props[gi].type) / 255;
          colors[i*3+2] = readVal(view, base + offsets[bi], props[bi].type) / 255;
        } else {
          colors[i*3] = colors[i*3+1] = colors[i*3+2] = 1;
        }
      }
    } else if (isAscii) {
      const lines = dec.decode(bytes.slice(headerEnd)).trim().split('\n');
      for (let i = 0; i < vertexCount; i++) {
        const parts = lines[i].trim().split(/\s+/);
        positions[i*3]   = parseFloat(parts[xi]);
        positions[i*3+1] = parseFloat(parts[yi]);
        positions[i*3+2] = parseFloat(parts[zi]);
        if (hasColor) {
          colors[i*3]   = parseInt(parts[ri]) / 255;
          colors[i*3+1] = parseInt(parts[gi]) / 255;
          colors[i*3+2] = parseInt(parts[bi]) / 255;
        } else {
          colors[i*3] = colors[i*3+1] = colors[i*3+2] = 1;
        }
      }
    } else {
      throw new Error('Ismeretlen PLY formátum.');
    }

    return { positions, colors, vertexCount };
  }

  // ── Build Three.js point cloud ──────────────────────────────────
  function buildPointCloud(data) {
    if (pointMesh) { scene.remove(pointMesh); pointMesh.geometry.dispose(); pointMesh.material.dispose(); }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(data.colors, 3));

    const mat = new THREE.PointsMaterial({
      size: parseFloat(document.getElementById('point-size').value) * 0.005,
      vertexColors: true,
      sizeAttenuation: true,
    });

    pointMesh = new THREE.Points(geo, mat);
    scene.add(pointMesh);

    // Center & fit camera
    geo.computeBoundingBox();
    const box = geo.boundingBox;
    const center = new THREE.Vector3();
    box.getCenter(center);
    pointMesh.position.sub(center);

    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, 0, maxDim * 1.2);
    controls.target.set(0, 0, 0);
    controls.update();

    return data.vertexCount;
  }

  // ── Load file ───────────────────────────────────────────────────
  function loadFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.ply')) {
      showStatus('Csak .ply fájlt fogadok el!', 'error'); return;
    }

    showStatus(`"${file.name}" betöltése...`, 'loading');

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = parsePLY(e.target.result);
        const count = buildPointCloud(data);

        // Info box
        const info = document.getElementById('info-box');
        info.className = 'show';
        info.innerHTML = `<strong>${file.name}</strong><br>
          Pontok: <strong>${count.toLocaleString('hu')}</strong><br>
          Méret: <strong>${(file.size / 1024 / 1024).toFixed(1)} MB</strong>`;

        showStatus(`✓ ${count.toLocaleString('hu')} pont betöltve`, 'success');
        setTimeout(hideStatus, 3000);
      } catch(err) {
        console.error(err);
        showStatus('Hiba: ' + err.message, 'error');
      }
    };
    reader.onerror = () => showStatus('Fájl olvasási hiba.', 'error');
    reader.readAsArrayBuffer(file);
  }

  // ── Load from URL ───────────────────────────────────────────────
  async function loadFromUrl(url) {
    if (!url) { showStatus('Add meg a fájl URL-jét!', 'error'); return; }
    showStatus('Letöltés folyamatban...', 'loading');
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} – nem sikerült letölteni`);
      const buffer = await resp.arrayBuffer();
      const data = parsePLY(buffer);
      const count = buildPointCloud(data);
      const info = document.getElementById('info-box');
      info.className = 'show';
      const name = url.split('/').pop();
      info.innerHTML = `<strong>${name}</strong><br>Pontok: <strong>${count.toLocaleString('hu')}</strong>`;
      showStatus(`✓ ${count.toLocaleString('hu')} pont betöltve`, 'success');
      setTimeout(hideStatus, 3000);
    } catch(err) {
      console.error(err);
      showStatus('Hiba: ' + err.message, 'error');
    }
  }

  document.getElementById('url-load-btn').addEventListener('click', () => {
    loadFromUrl(document.getElementById('url-input').value.trim());
  });
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadFromUrl(document.getElementById('url-input').value.trim());
  });

  // ── Auto-load on page open ──────────────────────────────────────
  const autoUrl = document.getElementById('url-input').value.trim();
  if (autoUrl) loadFromUrl(autoUrl);

  // ── File input / drag-drop ──────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    loadFile(e.target.files[0]);
  });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  });

  // ── Point size slider ───────────────────────────────────────────
  document.getElementById('point-size').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    document.getElementById('size-val').textContent = v.toFixed(1);
    if (pointMesh) pointMesh.material.size = v * 0.005;
  });

  // ── Camera buttons ──────────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', () => controls.reset());

  document.getElementById('top-btn').addEventListener('click', () => {
    if (!pointMesh) return;
    const box = new THREE.Box3().setFromObject(pointMesh);
    const size = new THREE.Vector3(); box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, maxDim * 1.5, 0);
    controls.target.set(0, 0, 0);
    camera.up.set(0, 0, -1);
    controls.update();
  });

})();
</script>
</body>
</html>
