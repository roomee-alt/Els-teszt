<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Lakás Modell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }

    #ui-panel {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      background: rgba(20,20,25,0.93); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 18px 20px; width: 240px;
      backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .badge { font-size: 10px; font-weight: 700; color: #4ade80; background: rgba(74,222,128,0.12); padding: 3px 8px; border-radius: 20px; }
    h2 { font-size: 14px; font-weight: 600; color: #fff; }
    .slider-row { margin-top: 12px; }
    .slider-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    label { font-size: 10px; letter-spacing: .06em; color: #777; text-transform: uppercase; }
    .val { font-size: 11px; color: #ccc; }
    input[type=range] { width: 100%; accent-color: #4ade80; cursor: pointer; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { cursor: pointer; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; padding: 9px 0; transition: all .15s; flex: 1; }
    #reset-btn { background: rgba(255,255,255,0.08); color: #ccc; }
    #reset-btn:hover { background: rgba(255,255,255,0.15); }
    #top-btn { background: rgba(96,165,250,0.15); color: #60a5fa; }
    #top-btn:hover { background: rgba(96,165,250,0.25); }
    #info-box { display: none; margin-top: 10px; padding: 8px 10px; background: rgba(255,255,255,.05); border-radius: 8px; font-size: 11px; color: #888; line-height: 1.7; }
    #info-box.show { display: block; }
    #info-box strong { color: #ccc; }

    #loading-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: #0d0d0d;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .big-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.1); border-top-color: #4ade80; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 14px; color: #888; }
    #error-msg { display: none; color: #f87171; font-size: 13px; text-align: center; max-width: 300px; line-height: 1.6; }

    #hint-panel {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      background: rgba(20,20,25,.85); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #555; line-height: 1.9;
    }
    #hint-panel span { color: #888; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="big-spinner" id="big-spinner"></div>
  <div id="loading-msg">3D modell betöltése...</div>
  <div id="error-msg"></div>
</div>

<div id="canvas-container"></div>

<div id="ui-panel">
  <div class="panel-header">
    <span class="badge">3D</span>
    <h2>Lakás Modell</h2>
  </div>
  <div id="info-box"></div>
  <div class="slider-row">
    <div class="slider-label-row">
      <label>Pont méret</label><span class="val" id="size-val">2.0</span>
    </div>
    <input type="range" id="point-size" min="0.5" max="10" step="0.5" value="2"/>
  </div>
  <div class="btn-row">
    <button id="reset-btn">↺ Reset</button>
    <button id="top-btn">⬆ Felülnézet</button>
  </div>
</div>

<div id="hint-panel">
  <span>Bal gomb</span> Forgatás &nbsp;|&nbsp;
  <span>Jobb gomb</span> Mozgatás &nbsp;|&nbsp;
  <span>Scroll</span> Zoom
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const PLY_FILE = 'model.ply';

function showError(msg) {
  document.getElementById('big-spinner').style.display = 'none';
  document.getElementById('loading-msg').style.display = 'none';
  const e = document.getElementById('error-msg');
  e.style.display = 'block';
  e.textContent = msg;
}

function hideOverlay() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

(function () {
  // Three.js setup
  const container = document.getElementById('canvas-container');
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0d0d0d);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.001, 10000);
  camera.position.set(0, 0, 5);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let pointMesh = null;
  function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
  animate();

  // PLY Parser
  function parsePLY(buffer) {
    const dec = new TextDecoder();
    const bytes = new Uint8Array(buffer);
    let headerEnd = 0;
    for (let i = 0; i < bytes.length - 9; i++) {
      if (dec.decode(bytes.slice(i, i + 10)) === 'end_header') {
        headerEnd = i + 10;
        if (bytes[headerEnd] === 13) headerEnd++;
        if (bytes[headerEnd] === 10) headerEnd++;
        break;
      }
    }
    const header = dec.decode(bytes.slice(0, headerEnd));
    const vcMatch = header.match(/element vertex (\d+)/);
    if (!vcMatch) throw new Error('Nem találom a vertex számot.');
    const vertexCount = parseInt(vcMatch[1]);
    const propLines = [...header.matchAll(/property (\S+) (\S+)/g)];
    const props = propLines.map(m => ({ type: m[1], name: m[2] }));
    const typeSize = { char:1,uchar:1,short:2,ushort:2,int:4,uint:4,float:4,double:8,int8:1,uint8:1,int16:2,uint16:2,int32:4,uint32:4,float32:4,float64:8 };
    let stride = 0;
    for (const p of props) stride += (typeSize[p.type] || 4);
    function findProp(names) {
      for (const n of names) { const idx = props.findIndex(p => p.name === n); if (idx !== -1) return idx; }
      return -1;
    }
    const xi = findProp(['x']), yi = findProp(['y']), zi = findProp(['z']);
    const ri = findProp(['red','r']), gi = findProp(['green','g']), bi = findProp(['blue','b']);
    if (xi < 0 || yi < 0 || zi < 0) throw new Error('Nem találom az x/y/z adatokat.');
    const positions = new Float32Array(vertexCount * 3);
    const colors = new Float32Array(vertexCount * 3);
    const hasColor = ri >= 0 && gi >= 0 && bi >= 0;
    const view = new DataView(buffer, headerEnd);
    const offsets = [];
    let off = 0;
    for (const p of props) { offsets.push(off); off += (typeSize[p.type] || 4); }
    function readVal(v, o, t) {
      switch(t) {
        case 'double': case 'float64': return v.getFloat64(o,true);
        case 'float': case 'float32': return v.getFloat32(o,true);
        case 'int': case 'int32': return v.getInt32(o,true);
        case 'uint': case 'uint32': return v.getUint32(o,true);
        case 'short': case 'int16': return v.getInt16(o,true);
        case 'ushort': case 'uint16': return v.getUint16(o,true);
        case 'char': case 'int8': return v.getInt8(o);
        default: return v.getUint8(o);
      }
    }
    for (let i = 0; i < vertexCount; i++) {
      const base = i * stride;
      positions[i*3]   = readVal(view, base+offsets[xi], props[xi].type);
      positions[i*3+1] = readVal(view, base+offsets[yi], props[yi].type);
      positions[i*3+2] = readVal(view, base+offsets[zi], props[zi].type);
      if (hasColor) {
        colors[i*3]   = readVal(view, base+offsets[ri], props[ri].type)/255;
        colors[i*3+1] = readVal(view, base+offsets[gi], props[gi].type)/255;
        colors[i*3+2] = readVal(view, base+offsets[bi], props[bi].type)/255;
      } else { colors[i*3]=colors[i*3+1]=colors[i*3+2]=1; }
    }
    return { positions, colors, vertexCount };
  }

  function buildPointCloud(data) {
    if (pointMesh) { scene.remove(pointMesh); pointMesh.geometry.dispose(); pointMesh.material.dispose(); }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(data.colors, 3));
    const mat = new THREE.PointsMaterial({ size: parseFloat(document.getElementById('point-size').value)*0.005, vertexColors: true, sizeAttenuation: true });
    pointMesh = new THREE.Points(geo, mat);
    scene.add(pointMesh);
    geo.computeBoundingBox();
    const box = geo.boundingBox;
    const center = new THREE.Vector3(); box.getCenter(center);
    pointMesh.position.sub(center);
    const size = new THREE.Vector3(); box.getSize(size);
    camera.position.set(0, 0, Math.max(size.x,size.y,size.z) * 1.2);
    controls.target.set(0,0,0); controls.update();
    return data.vertexCount;
  }

  async function autoLoad() {
    try {
      document.getElementById('loading-msg').textContent = 'Modell letöltése (14 MB)...';
      const resp = await fetch(PLY_FILE);
      if (!resp.ok) throw new Error('A fájl nem található: ' + PLY_FILE + ' (HTTP ' + resp.status + ')');
      document.getElementById('loading-msg').textContent = 'Modell feldolgozása...';
      const buffer = await resp.arrayBuffer();
      const data = parsePLY(buffer);
      buildPointCloud(data);
      const info = document.getElementById('info-box');
      info.className = 'show';
      info.innerHTML = 'Pontok: <strong>' + data.vertexCount.toLocaleString('hu') + '</strong>';
      hideOverlay();
    } catch(err) {
      console.error(err);
      showError('Hiba: ' + err.message);
    }
  }

  document.getElementById('point-size').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    document.getElementById('size-val').textContent = v.toFixed(1);
    if (pointMesh) pointMesh.material.size = v * 0.005;
  });
  document.getElementById('reset-btn').addEventListener('click', () => controls.reset());
  document.getElementById('top-btn').addEventListener('click', () => {
    if (!pointMesh) return;
    const box = new THREE.Box3().setFromObject(pointMesh);
    const size = new THREE.Vector3(); box.getSize(size);
    camera.position.set(0, Math.max(size.x,size.y,size.z)*1.5, 0);
    controls.target.set(0,0,0); camera.up.set(0,0,-1); controls.update();
  });

  autoLoad();
})();
</script>
</body>
</html>
